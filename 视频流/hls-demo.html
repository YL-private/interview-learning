<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>HLS 对接 Demo</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 24px; }
    .row { margin-bottom: 12px; }
    video { width: 900px; max-width: 100%; background: #000; }
    input { width: 680px; max-width: 100%; }
    button { margin-left: 8px; }
  </style>
</head>
<body>
  <h2>HLS 播放 Demo</h2>
  <p>支持 m3u8 流。Safari 原生支持，其它浏览器走 hls.js。</p>

  <div class="row">
    <label for="hlsUrl">HLS 地址：</label>
    <input id="hlsUrl" value="https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8" />
    <button id="playBtn">播放</button>
  </div>

  <video id="video" controls autoplay muted playsinline></video>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script>
    const video = document.getElementById("video");
    const urlInput = document.getElementById("hlsUrl");
    const playBtn = document.getElementById("playBtn");
    let hlsInstance = null;

    function playHls(url) {
      if (hlsInstance) {
        hlsInstance.destroy();
        hlsInstance = null;
      }

      if (video.canPlayType("application/vnd.apple.mpegurl")) {
        video.src = url;
        video.play().catch(console.error);
        return;
      }

      if (window.Hls && Hls.isSupported()) {
        hlsInstance = new Hls({
          enableWorker: true,
          lowLatencyMode: true,
        });
        hlsInstance.loadSource(url);
        hlsInstance.attachMedia(video);
        hlsInstance.on(Hls.Events.ERROR, (_, data) => {
          console.error("HLS error:", data);
        });
        return;
      }

      alert("当前浏览器不支持 HLS 播放");
    }

    playBtn.addEventListener("click", () => {
      const url = urlInput.value.trim();
      if (!url) return;
      playHls(url);
    });
  </script>
</body>
</html>
